        #themeToggleBtn .moon-icon { display: block; }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-ui); letter-spacing: 0; }

        .subtitle { color: var(--text-secondary); font-size: 13px; opacity: 1; line-height: 1.35; margin-top: 3px; }
        .header-actions { display: flex; gap: 8px; align-items: center; }
        .icon-btn, .lang-btn { background: var(--bg-surface-alt); color: var(--color-primary); border: 1px solid var(--border-light); padding: 7px 10px; border-radius: var(--radius-control); cursor: pointer; font-size: 12px; display: flex; align-items: center; gap: 4px; transition: background 0.2s, transform 0.2s, box-shadow 0.2s, border-color 0.2s, color 0.2s; }
        .icon-btn { font-weight: 700; min-width: 36px; min-height: 36px; justify-content: center; }
        .icon-btn:disabled { cursor: wait; opacity: 0.72; transform: none; }
        .icon-btn.notifications-enabled { background: var(--color-primary); color: var(--text-inverse); border-color: var(--color-primary); box-shadow: 0 8px 18px var(--shadow-base); }

        .icon-btn:active { background: var(--color-primary-dark); color: var(--text-inverse); transform: scale(0.95); }
        @media (hover: hover) { .icon-btn:hover { background: var(--color-primary); color: var(--text-inverse); border-color: var(--color-primary); transform: translateY(-1px); box-shadow: 0 8px 18px var(--shadow-base); } }
        .menu { display: none; position: absolute; top: 58px; right: 0; background: var(--bg-surface); border: 1px solid var(--border-light); border-radius: var(--radius-surface); box-shadow: 0 18px 42px var(--shadow-float); z-index: 900; min-width: 190px; padding: 6px; }

        .menu-item:active { background: var(--bg-active); }

        @media (hover: hover) { .menu-item:hover { background: var(--bg-hover); } }

        }

<div class="container">
    <header>
        <div>
            <h1 data-i18n="app.title">任务跟踪器</h1>
            <p class="subtitle" data-i18n="app.subtitle">基于截止日期的任务管理</p>
        </div>
        <div class="header-actions">
            <button class="icon-btn" id="themeToggleBtn" aria-label="切换主题" data-i18n-aria-label="tooltips.theme" data-i18n-title="tooltips.theme" title="切换主题">
                <svg class="icon moon-icon"><use href="#icon-moon"></use></svg>
                <svg class="icon sun-icon"><use href="#icon-sun"></use></svg>
            </button>
            <button class="icon-btn" id="notificationToggleBtn" aria-label="开启/关闭通知" title="开启通知">
                <svg class="icon"><use href="#icon-bell-off"></use></svg>
            </button>
            <button class="icon-btn" id="openModalBtn" aria-label="添加新任务" data-i18n-aria-label="modal.addTitle" data-i18n-title="tooltips.addTask" title="添加新任务 (Ctrl+I)">
                <svg class="icon"><use href="#icon-plus"></use></svg>
            </button>
            <button class="icon-btn" id="openMenuBtn" aria-label="打开菜单" data-i18n-aria-label="actions.openMenu" aria-haspopup="true" aria-expanded="false" aria-controls="menu" data-i18n-title="tooltips.menu" title="菜单 (Ctrl+M)">
                <svg class="icon icon-fill"><use href="#icon-menu"></use></svg>
            </button>
            <div class="menu" id="menu" aria-labelledby="openMenuBtn">
                <button class="menu-item" data-i18n-title="actions.export" id="exportBtn" title="导出">
                    <svg class="icon"><use href="#icon-export"></use></svg>
                    <span data-i18n="actions.export">导出</span>
                </button>
                <button class="menu-item" data-i18n-title="actions.import" id="importBtn" title="导入">
                    <svg class="icon"><use href="#icon-import"></use></svg>
                    <span data-i18n="actions.import">导入</span>
                </button>
                <div class="menu-divider"></div>
                <button class="menu-item" data-i18n-title="actions.clearCompletedTitle" id="clearCompletedBtn" title="清除所有已完成的任务">
                    <svg class="icon icon-sm" style="color: var(--color-danger);"><use href="#icon-trash-lines"></use></svg>
                    <span data-i18n="actions.clearCompleted">清除已完成</span>
                </button>
                <div class="menu-divider"></div>
                <button class="menu-item" id="langMenuToggle" aria-haspopup="menu" aria-expanded="false" aria-controls="langSubmenu">
                    <svg class="icon icon-sm" style="color: var(--color-primary);"><use href="#icon-globe-language"></use></svg>
                    <span data-i18n="app.language" style="margin-left: 10px;">语言</span>
                    <svg class="icon icon-sm" style="margin-left: auto; transition: transform 0.2s;"><use href="#icon-chevron-right"></use></svg>
                </button>
                <div class="submenu" id="langSubmenu" role="menu" aria-labelledby="langMenuToggle"><div id="lang-container" role="none"></div></div>
            </div>
        </div>
        <input accept=".json" class="file-input" id="importFile" type="file">
    </header>
    <div class="main-content">
        <div class="controls-bar" role="toolbar" aria-label="任务工具栏" data-i18n-aria-label="app.toolbar">
            <div class="search-box">
                <label for="searchInput" class="sr-only" data-i18n="search.placeholder">搜索任务...</label>
                <input class="search-input" data-i18n-placeholder="search.placeholder" id="searchInput" placeholder="搜索任务..." type="text">
                <div class="shortcut-hint" aria-hidden="true"><kbd class="shortcut-kbd" data-i18n-title="tooltips.searchShortcut" title="搜索快捷键：Ctrl/Cmd + K">⌘K</kbd></div>
            </div>
            <div class="dropdown-container" id="filterDropdown">
                <button class="dropdown-btn" id="filterBtn" aria-haspopup="listbox" aria-expanded="false" aria-controls="filterMenu">
                    <svg class="icon icon-sm" style="opacity: 0.7;"><use href="#icon-filter"></use></svg>
                    <span id="currentFilterLabel" data-i18n="filters.active">进行中</span>
                    <svg class="icon icon-sm chevron"><use href="#icon-chevron-down"></use></svg>
                </button>
                <div class="dropdown-menu-content" id="filterMenu" role="listbox" aria-labelledby="filterBtn">
                    <button type="button" class="dropdown-option" role="option" aria-selected="false" data-filter="all"><span data-i18n="filters.all">全部</span><span class="filter-count" id="count-all">(0)</span></button>
                    <button type="button" class="dropdown-option selected" role="option" aria-selected="true" data-filter="active"><span data-i18n="filters.active">进行中</span><span class="filter-count" id="count-active">(0)</span></button>
                    <button type="button" class="dropdown-option" role="option" aria-selected="false" data-filter="completed"><span data-i18n="filters.completed">已完成</span><span class="filter-count" id="count-completed">(0)</span></button>
                    <button type="button" class="dropdown-option" role="option" aria-selected="false" data-filter="overdue"><span data-i18n="filters.overdue">已过期</span><span class="filter-count" id="count-overdue">(0)</span></button>
                    <button type="button" class="dropdown-option" role="option" aria-selected="false" data-filter="no-deadline"><span data-i18n="filters.noDeadline">无截止日期</span><span class="filter-count" id="count-no-deadline">(0)</span></button>
                </div>
            </div>
            <div class="dropdown-container" id="sortDropdown">
                <button class="dropdown-btn" id="sortBtn" aria-haspopup="listbox" aria-expanded="false" aria-controls="sortMenu">
                    <svg class="icon icon-sm" style="opacity: 0.7;"><use href="#icon-sort"></use></svg>
                    <span id="currentSortLabel" data-i18n="sort.smart">智能排序</span>
                    <svg class="icon icon-sm chevron"><use href="#icon-chevron-down"></use></svg>
                </button>
                <div class="dropdown-menu-content" id="sortMenu" role="listbox" aria-labelledby="sortBtn">
                    <button type="button" class="dropdown-option selected" role="option" aria-selected="true" data-sort="smart"><span data-i18n="sort.smart">智能排序</span></button>
                    <button type="button" class="dropdown-option" role="option" aria-selected="false" data-sort="created-desc"><span data-i18n="sort.created">新创建</span></button>
                    <button type="button" class="dropdown-option" role="option" aria-selected="false" data-sort="due-asc"><span data-i18n="sort.due">截止日期</span></button>
                    <button type="button" class="dropdown-option" role="option" aria-selected="false" data-sort="alpha-asc"><span data-i18n="sort.alpha">A-Z</span></button>
                    <button type="button" class="dropdown-option" role="option" aria-selected="false" data-sort="manual"><span data-i18n="sort.manual">自定义排序 (拖拽)</span></button>
                </div>
            </div>
        </div>
        <div class="tasks-section">
            <div id="taskList" aria-live="polite">
                <div class="loading-state" id="initial-loader">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>
    </div>
</div>
<button id="backToTopBtn" class="back-to-top" aria-label="回到顶部" data-i18n-aria-label="tooltips.backToTop" data-i18n-title="tooltips.backToTop" title="回到顶部 (Alt + T)">
    <svg class="icon" width="24" height="24" ><use href="#icon-arrow-up"></use></svg>
</button>
<div class="modal" id="taskModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-content">
        <div class="modal-header">
            <h3 class="modal-title" data-i18n="modal.addTitle" id="modalTitle">添加新任务</h3>
            <button class="close-btn" id="closeModalBtn" aria-label="取消" data-i18n-aria-label="actions.cancel">&times;</button>
        </div>
        <div class="modal-body">
            <form id="taskForm">
                <div class="form-group">
                    <label data-i18n="form.taskName.label" for="taskName">任务名称 *</label>
                    <input data-i18n-placeholder="form.taskName.placeholder" id="taskName" name="taskName" placeholder="输入任务名称" required type="text">
                </div>
                <div class="form-group">
                    <label data-i18n="form.description.label" for="taskDesc">任务描述 (可选)</label>
                    <textarea data-i18n-placeholder="form.description.placeholder" id="taskDesc" placeholder="输入任务描述"></textarea>
                </div>
                <div class="form-group">
                    <label data-i18n="form.dueDate.label" for="dueDate">截止日期 (可选)</label>
                    <div class="datetime-group">
                        <input class="date-input" id="dueDate" type="date">
                        <label for="dueTime" class="sr-only" data-i18n="form.dueTime.label">截止时间</label>
                        <input class="time-input" id="dueTime" type="time" value="23:59">
                    </div>
                    <div class="checkbox-group">
                        <label data-i18n="form.noDeadline" for="noDeadline">无截止日期</label>
                        <input id="noDeadline" type="checkbox">
                    </div>
                </div>
                <div class="form-group" id="reminderGroup">
                    <label data-i18n="form.reminder.label" for="reminderOffset">提醒设置</label>
                    <select id="reminderOffset" class="search-input" style="width: 100%;">
                        <option value="-1" data-i18n="form.reminder.options.none">不提醒</option>
                        <option value="0" data-i18n="form.reminder.options.atTime">截止时</option>
                        <option value="15" selected data-i18n="form.reminder.options.min15">提前 15 分钟</option>
                        <option value="60" data-i18n="form.reminder.options.hour1">提前 1 小时</option>
                        <option value="1440" data-i18n="form.reminder.options.day1">提前 1 天</option>
                    </select>
                </div>
                <div class="form-group">
                    <label data-i18n="form.subtasks.label" for="subtaskInput">子任务 (可选)</label>
                    <div class="subtask-input-wrapper">
                        <input type="text" id="subtaskInput" data-i18n-placeholder="form.subtasks.placeholder" placeholder="添加子任务..." autocomplete="off">
                        <button type="button" id="addSubtaskBtn" class="btn-icon-small" aria-label="添加子任务" data-i18n-aria-label="form.subtasks.add" data-i18n-title="form.subtasks.add" title="添加子任务">
                            <svg class="icon icon-sm"><use href="#icon-plus"></use></svg>
                        </button>
                    </div>
                    <ul id="subtaskListPreview" class="subtask-preview-list"></ul>
                </div>
                <div class="form-actions">
                    <button class="btn btn-secondary" data-i18n="actions.cancel" id="cancelBtn" type="button">取消</button>
                    <button class="btn btn-primary" data-i18n="actions.addTask" id="submitBtn" type="submit">添加任务</button>
                </div>
            </form>
        </div>
    </div>
</div>
<div class="notification" id="notification" role="status" aria-live="polite" aria-atomic="true">
    <svg class="icon"><use href="#icon-check"></use></svg>
    <span id="notificationText"></span>
</div>
<div id="srStatus" class="sr-only" aria-live="polite" aria-atomic="true"></div>
<template id="task-template">
    <div class="task-item">
        <div class="task-item-right">
            <div class="task-header">
                <div class="task-title">
                    <span class="task-name"></span>
                    <svg class="icon icon-sm task-reminder-icon" role="img" aria-label="提醒已设置" style="display:none; color: var(--color-warning); margin-left: 6px; width: 14px; height: 14px;"><use href="#icon-bell"></use></svg>
                </div>
                <div class="task-date"></div>
            </div>
            <div class="task-desc"></div>
            <div class="subtasks-list"></div>
            <div class="progress-bar" aria-hidden="true"><div class="progress-fill"></div></div>
            <div class="task-footer">
                <div class="status-indicator">
                    <div class="status-dot" aria-hidden="true"></div>
                    <span class="status-text"></span> <span class="status-time-left"></span> </div>
                <div class="task-actions">
                    <button class="action-btn complete-btn" data-action="toggle" title="标记完成">
                        <svg class="icon"><use href="#icon-check"></use></svg>
                    </button>
                    <button class="action-btn edit-btn" data-action="edit" title="编辑">
                        <svg class="icon"><use href="#icon-edit"></use></svg>
                    </button>
                    <button class="action-btn delete-btn" data-action="delete" title="删除">
                        <svg class="icon"><use href="#icon-trash"></use></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>
</template>
<footer class="app-footer">
    <a href="https://github.com/muquew/Task-Tracer" target="_blank" rel="noopener noreferrer" class="footer-link">
        <svg class="icon icon-fill"><use href="#icon-github"></use></svg>
        GitHub
    </a>
    <div class="footer-copyright">© 2025 muquew · Personal Non-Commercial License</div>
</footer>
<script>
    (function() {
        const CONFIG = {
            DB: {
                NAME: 'TaskTrackerDB',
                VERSION: 2,

        function validateTranslations() {
            const base = state.translations[CONFIG.DEFAULTS.LANG];
            if (!base) throw new Error(`Missing default language: ${CONFIG.DEFAULTS.LANG}`);
            const baseKeys = Object.keys(base).sort();
            CONFIG.LANGUAGES.forEach(({ code }) => {
                const current = state.translations[code];
                if (!current) throw new Error(`Missing language: ${code}`);
                const missing = baseKeys.filter(key => !(key in current));
                const extra = Object.keys(current).filter(key => !(key in base));
                if (missing.length || extra.length) {
                    console.warn(`[i18n] ${code} key mismatch`, { missing, extra });
                }
            });
        }
        function createLangButtons() {
            DOM.menu.langContainer.innerHTML = '';
            CONFIG.LANGUAGES.forEach(l => {
                const b = document.createElement('button');
                b.type = 'button';
                b.className = 'lang-btn';
                b.dataset.lang = l.code;
                b.setAttribute('role', 'menuitemradio');
                b.textContent = l.name;
                DOM.menu.langContainer.appendChild(b);
            });
        }
        function initLanguage() {
            document.querySelectorAll('.lang-btn').forEach(button => {
                const active = button.dataset.lang === state.currentLanguage;
                button.classList.toggle(CONFIG.UI.CLASSES.ACTIVE, active);
                button.setAttribute('aria-checked', String(active));
            });
            document.documentElement.lang = state.currentLanguage;
            document.documentElement.dir = getLanguageDirection(state.currentLanguage);
            utils.applyTranslations();
        }
        function getLanguageDirection(code) {
            return ['ar', 'fa', 'he', 'ur'].includes(normalizeLanguageCode(code).split('-')[0]) ? 'rtl' : 'ltr';
        }
        function switchLanguage(code) {
            if (!state.translations[code]) return;
            state.currentLanguage = code;
            dbActions.setConfig(CONFIG.STORAGE.LANG, code);
            initLanguage();
        }
        function startProgressTimer() {
            if (state.progressInterval) clearInterval(state.progressInterval);
            state.progressInterval = setInterval(refreshTaskTimers, 60000);
            refreshTaskTimers();
        }
        function refreshTaskTimers() {
            document.querySelectorAll('.task-item:not(.completed-task)').forEach(el => {
                const id = Number(el.dataset.taskId);
                const task = state.tasks.find(t => t.id === id);
                if (!task || !task.dueDate) return;
                const timeLeft = utils.calculateTimeLeft(task.dueDate);
                const statusObj = utils.getStatus(timeLeft);
                const statusText = el.querySelector('.status-text');
                const timeEl = el.querySelector('.status-time-left');
                if (statusText) statusText.textContent = statusObj.text;
                if (timeEl) timeEl.textContent = `(${utils.formatTime(timeLeft)})`;
                const progressFill = el.querySelector('.progress-fill');
                if (progressFill) progressFill.style.width = `${statusObj.percent}%`;
                const allStatusClasses = Object.values(CONFIG.UI.STATUS);
                if (!el.classList.contains(statusObj.cls)) {
                    el.classList.remove(...allStatusClasses);
                    el.classList.add(statusObj.cls);
                }
            });
            if (state.notificationsEnabled) {
                checkNotifications();
            }
        }
        function getEmptyStateHTML(t) {
            return `<div class="empty-state"><svg class="icon icon-lg" aria-hidden="true" focusable="false"><use href="#icon-empty-tasks"></use></svg><h3>${t['empty.noTasks.title']}</h3><p>${t['empty.noTasks.description']}</p></div>`;
        }
        function getEmptyMatchHTML(t) {
            return `<div class="empty-state"><svg class="icon icon-lg icon-fill" aria-hidden="true" focusable="false"><use href="#icon-empty-search"></use></svg><h3>${t['empty.noMatches.title']}</h3><p>${t['empty.noMatches.description']}</p></div>`
        }
        function handleVisibilityChange() {
            refreshTaskTimers();
            if (!state.progressInterval) startProgressTimer();
        }
        async function exportTasks() {
            const t = state.translations[state.currentLanguage];
            try {
                const tasks = await loadNormalizedTasks();
                state.tasks = tasks;
                const date = new Date().toISOString();
                const blob = new Blob([JSON.stringify({ version: '1.1', date, tasks }, null, 2)], {type: 'application/json'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url; a.download = `task-tracer_${date.split('T')[0]}.json`;
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                URL.revokeObjectURL(url);
                closeMenu();
                utils.notify(t['messages.export.success']);
            } catch (err) {
                console.error('导出任务失败:', err);
                utils.notify(t['messages.export.error'], 'error');
            }
        }
        function importTasks(file) {
            if(!file) return;
            closeMenu();
            const reader = new FileReader();
            const t = state.translations[state.currentLanguage];
            reader.onload = async (e) => {
                try {
                    const data = JSON.parse(e.target.result.toString());
                    const rawTasks = getImportTaskArray(data);
                    if (!rawTasks) {
                        utils.notify(t['messages.import.formatError'], 'error');
                        return;
                    }
                    utils.confirm(t['actions.import'], t['messages.import.confirm'].replace('{count}', rawTasks.length), async () => {
                        try {
                            const importedTasks = normalizeImportedTasks(rawTasks);
                            await dbActions.replaceAllTasks(importedTasks);
                            clearNotificationDeliveryState();
                            await refreshTasks();
                            utils.notify(t['messages.import.success'].replace('{count}', importedTasks.length));
                        } catch (err) {
                            console.error('导入任务失败:', err);
                            utils.notify(t['messages.import.readError'], 'error');
                            throw err;
                        }
                    });
                } catch(err) {
                    utils.notify(t['messages.import.readError'], 'error');
                    console.error('导入错误:', err);
                }
            };
            reader.onerror = () => utils.notify(t['messages.import.readError'], 'error');
            reader.readAsText(file);
            DOM.menu.fileInput.value = '';
        }
        function getImportTaskArray(data) {
            if (Array.isArray(data)) return data;
            if (data && typeof data === 'object' && Array.isArray(data.tasks)) return data.tasks;
            return null;
        }
        function normalizeImportedTasks(rawTasks) {
            const usedIds = new Set();
            const normalizeId = (value) => {
                return normalizeUniqueNumericId(value, usedIds);
            };
            return rawTasks.map((rawTask, index) => normalizeImportedTask(rawTask, index, normalizeId));
        }
        function normalizeImportedTask(rawTask, index, normalizeId) {
            const task = rawTask && typeof rawTask === 'object' ? rawTask : {};
            return {
                id: normalizeId(task.id),
                name: String(task.name || '').trim() || utils.translate('task.importedFallback').replace('{index}', index + 1),
                description: task.description ? String(task.description) : '',
                dueDate: normalizeStoredDate(task.dueDate),
                reminderOffset: Number.isFinite(Number(task.reminderOffset)) ? Number(task.reminderOffset) : 15,
                subtasks: normalizeImportedSubtasks(task.subtasks),
                completed: typeof task.completed === 'boolean' ? task.completed : false,
                createdAt: normalizeStoredDate(task.createdAt) || new Date().toISOString(),
                order: Number.isFinite(Number(task.order)) ? Number(task.order) : (index + 1) * CONFIG.DEFAULTS.ORDER_STEP
            };
        }
        function normalizeImportedSubtasks(rawSubtasks) {
            if (!Array.isArray(rawSubtasks)) return [];
            const usedIds = new Set();
            return rawSubtasks.map(rawSubtask => {
                const subtask = rawSubtask && typeof rawSubtask === 'object' ? rawSubtask : {};
                return {
                    id: normalizeUniqueNumericId(subtask.id, usedIds),
                    text: String(subtask.text || '').trim(),
                    completed: !!subtask.completed
                };
            }).filter(subtask => subtask.text);
        }
        function normalizeStoredDate(value) {
            return typeof value === 'string' && !Number.isNaN(Date.parse(value)) ? value : null;
        }
        async function addSampleTasks() {
            const t = state.translations[state.currentLanguage];
            const samples = [
                { id: Date.now()+1, name: t['samples.task1.name'] || "完成项目报告", description: t['samples.task1.description'] || "编写并提交季度项目总结报告", dueDate: utils.dateToStoredISO(new Date(Date.now() + 432000000)), createdAt: new Date().toISOString(), completed: false },
                { id: Date.now()+2, name: t['samples.task2.name'] || "团队会议准备", description: t['samples.task2.description'] || "准备下周团队会议的演示材料", dueDate: utils.dateToStoredISO(new Date(Date.now() + 864000000)), createdAt: new Date().toISOString(), completed: false },
                { id: Date.now()+3, name: t['samples.task3.name'] || "学习计划制定", description: t['samples.task3.description'] || "制定下个月的个人学习计划", dueDate: null, createdAt: new Date().toISOString(), completed: false }
            ];
            await Promise.all(samples.map(s => dbActions.addTask(s)));
            await refreshTasks();
            utils.notify(t['messages.sampleTasks.added']);
        }
    })();
</script>
